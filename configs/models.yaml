# Model configurations for ai-router
# Maps model names to their providers and capabilities

models:
  # MiniMax models (primary for this deployment)
  MiniMax-M2.7:
    name: MiniMax-M2.7
    provider: ep38
    contextWindow: 200000
    description: MiniMax MoE 2.7 (200K context, recommended primary)
    capabilities:
      - chat
      - tools
    wireModel: MiniMax-M2.7

  MiniMax-M2:
