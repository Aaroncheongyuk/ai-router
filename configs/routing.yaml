# Routing configuration for ai-router
# Maps runtime + role combinations to model chains
#
# 2026-03-18: glm-5 promoted to primary after overnight data showed
# MiniMax-M2.5 failing 10/12 sessions (rate_limit + transport errors).
# Added role-based differentiation and expanded chains to 5 candidates.

routes:
  gastown:
    default:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Default fallback chain (glm-5 primary, stable)
      runtime: gastown

    # Town-level roles — need strong reasoning
    mayor:
      modelChain:
        - glm-5
        - MiniMax-M2.5
        - glm-4.7
        - kimi-k2.5
        - glm-4
      description: Mayor needs strong reasoning, glm-5 primary
      runtime: gastown

    deacon:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Deacon uses glm-5 primary
      runtime: gastown

    # Crew roles — differentiated by workload type
    crew:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Generic crew fallback chain
      runtime: gastown

    crew/builder:
      modelChain:
        - glm-5
        - MiniMax-M2.5
        - glm-4.7
        - kimi-k2.5
        - glm-4
      description: Builder needs strong coding, glm-5 then MiniMax
      runtime: gastown

    crew/scout:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Scout is research-only, cheaper model first
      runtime: gastown

    crew/tester:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Tester is backtest-only, cheaper model first
      runtime: gastown

    boot:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Boot uses glm-5 primary
      runtime: gastown

    witness:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Witness is lightweight, cheaper model first
      runtime: gastown

    refinery:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Refinery is lightweight, cheaper model first
      runtime: gastown

    polecat:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Polecat is lightweight, cheaper model first
      runtime: gastown

  coworker:
    runtime: coworker
    inherits: gastown

    default:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Default coworker chain
      runtime: coworker

    boot:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Coworker boot
      runtime: gastown

    witness:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Coworker witness
      runtime: gastown

    refinery:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Coworker refinery
      runtime: gastown

    polecat:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Coworker polecat
      runtime: gastown

  # Rig-specific routes (inherited from gastown runtime)
  ai_router:
    runtime: ai_router
    inherits: gastown

    crew/router_core:
      modelChain:
        - glm-5
        - MiniMax-M2.5
        - glm-4.7
        - kimi-k2.5
        - glm-4
      description: Router core — needs strong reasoning
      runtime: ai_router

    crew/runtime_recovery:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Runtime recovery crew
      runtime: ai_router

    crew/infra_sre:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Infra SRE crew
      runtime: ai_router

    crew/pi_adapter:
      modelChain:
        - glm-5
        - glm-4.7
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Pi adapter crew
      runtime: ai_router

    witness:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Ai router witness
      runtime: ai_router

    refinery:
      modelChain:
        - glm-4.7
        - glm-5
        - MiniMax-M2.5
        - kimi-k2.5
        - glm-4
      description: Ai router refinery
      runtime: ai_router

  claude:
    default: claude-sonnet-4-6

  # Default fallback for unknown roles
  default:
    modelChain:
      - glm-5
      - glm-4.7
      - MiniMax-M2.5
      - kimi-k2.5
      - glm-4
    description: Default route for unknown runtime/role
    runtime: gastown
