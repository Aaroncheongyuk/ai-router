# Routing configuration for ai-router
# Maps runtime + role combinations to model chains

routes:
  gastown:
    default:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Default fallback for unknown gastown roles
      runtime: gastown

    # Town-level roles stay on shared gastown runtime
    mayor:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Mayor uses primary MiniMax chain
      runtime: gastown

    deacon:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Deacon uses primary MiniMax chain
      runtime: gastown

  coworker:
    default:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Default fallback for unknown coworker roles
      runtime: coworker

    boot:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Boot uses primary MiniMax chain
      runtime: gastown

    witness:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Witness uses primary MiniMax chain
      runtime: gastown

    refinery:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Refinery uses primary MiniMax chain
      runtime: gastown

    polecat:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Default polecat uses primary MiniMax chain
      runtime: gastown

  # Rig-specific routes (inherited from gastown runtime)
  ai_router:
    runtime: ai_router
    inherits: gastown

    # Crew roles in ai_router rig
    crew/router_core:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Router core crew uses primary MiniMax chain
      runtime: ai_router

    crew/runtime_recovery:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Runtime recovery crew uses primary MiniMax chain
      runtime: ai_router

    crew/infra_sre:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Infra SRE crew uses primary MiniMax chain
      runtime: ai_router

    witness:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Ai router witness uses primary MiniMax chain
      runtime: ai_router

    refinery:
      modelChain:
        - MiniMax-M2.5
        - glm-5
        - glm-4.7
      description: Ai router refinery uses primary MiniMax chain
      runtime: ai_router

  claude:
    default: claude-sonnet-4-6

  # Default fallback for unknown roles
  default:
    modelChain:
      - MiniMax-M2.5
      - glm-5
      - glm-4.7
    description: Default route for unknown runtime/role
    runtime: gastown
